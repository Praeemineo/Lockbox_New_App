specVersion: '3.0'
metadata:
  name: com.sap.lockbox
type: application
framework:
  name: SAPUI5
  version: '1.108.0'
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.table
    - name: sap.ui.unified
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: lockbox-ui
        additionalFiles:
          - webapp/xs-app.json
