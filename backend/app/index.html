<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Language" content="en">
    <title>SAP Lockbox Application</title>
    <script>
        // Set backend URL for API calls - empty means same origin
        window.REACT_APP_BACKEND_URL = "";
    </script>
    <script
        id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_fiori_3"
        data-sap-ui-libs="sap.m,sap.ui.core,sap.ui.layout,sap.ui.table,sap.ui.unified"
        data-sap-ui-resourceroots='{"lockbox": "./webapp"}'
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
        data-sap-ui-language="en"
        data-sap-ui-xx-bindingSyntax="complex"
        data-sap-ui-preload="async"
        data-sap-ui-xx-componentPreload="off"
        data-sap-ui-oninit="module:lockbox/init">
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        html {
            height: 100%;
        }
        #content {
            height: 100%;
        }
        /* Hide React root and error overlay */
        #root, #webpack-dev-server-client-overlay {
            display: none !important;
        }
    </style>
</head>
<body class="sapUiBody" id="content">
    <div id="root"></div>
</body>
</html>
