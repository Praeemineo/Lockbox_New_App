_schema-version: "3.2"
ID: lockbox-app
version: 1.0.0
description: SAP Lockbox Application - Upload, Review and Post to SAP
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

modules:
  # ============================================================
  # FRONTEND UI5 MODULE - For HTML5 Repository
  # ============================================================
  - name: lockbox-ui
    type: html5
    path: backend/app
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
      supported-platforms: []
    requires:
      - name: lockbox-html5-repo-runtime

  # ============================================================
  # UI DEPLOYER MODULE - Deploys UI to HTML5 Repository
  # ============================================================
  - name: lockbox-ui-deployer
    type: com.sap.application.content
    path: deployer
    requires:
      - name: lockbox-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - lockbox-ui.zip
          name: lockbox-ui
          target-path: resources/

  # ============================================================
  # Backend Service Module
  # ============================================================
  - name: lockbox-srv
    type: nodejs
    path: backend
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1024M
      health-check-type: http
      health-check-http-endpoint: /api/health
    properties:
      NODE_ENV: production
      SAP_URL: "https://44.194.22.195:44301"
      SAP_CLIENT: "100"
      SAP_USER: "S4H_FIN"
      SAP_PASSWORD: "Welcome1"
      DB_HOST: "postgres-aee790df-b48b-48cc-96b3-db432a62390e.czuelothxj0h.ap-southeast-2.rds.amazonaws.com"
      DB_PORT: "2477"
      DB_NAME: "CAmqjnIfEdIX"
      DB_USER: "CAmqjnIfEdIX"
      DB_PASSWORD: "593373429221a65ff07f625d1b"
      DB_SSL: "true"
    requires:
      - name: postgresql-db
      - name: lockbox-destination
      - name: lockbox-xsuaa
      - name: lockbox-connectivity
      - name: lockbox-html5-repo-runtime
    provides:
      - name: lockbox-srv-api
        properties:
          srv-url: ${default-url}
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - "*.py"
        - "__pycache__/"
        - app/dist/
        - app/webapp/

  # ============================================================
  # Frontend Approuter Module
  # ============================================================
  - name: lockbox-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 512M
      keep-existing-routes: true
    properties:
      TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
    requires:
      - name: lockbox-xsuaa
      - name: lockbox-destination
      - name: lockbox-html5-repo-runtime
      - name: lockbox-srv-api
        group: destinations
        properties:
          name: backend
          url: ~{srv-url}
          forwardAuthToken: true
          timeout: 600000

resources:
  # ============================================================
  # HTML5 Application Repository - Host (for deployment)
  # ============================================================
  - name: lockbox-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # ============================================================
  # HTML5 Application Repository - Runtime (for serving apps)
  # ============================================================
  - name: lockbox-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  # ============================================================
  # PostgreSQL Database Service (Using existing service)
  # ============================================================
  - name: postgresql-db
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: Postgresql

  # SAP Destination Service
  - name: lockbox-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Name: S4HANA_SYSTEM_DESTINATION
                Description: SAP S/4HANA System
                Type: HTTP
                ProxyType: OnPremise
                Authentication: BasicAuthentication
                URL: http://s4fnd:443
                User: S4H_FIN
                Password: Welcome1
                HTML5.DynamicDestination: true
                WebIDEEnabled: true
                sap-client: "100"
                WebIDEUsage: odata_abap,odata_gen,bsp_execute_abap,odata_abap,ui5_execute_abap,dev_abap
            existing_destinations_policy: update

  # SAP Cloud Connector (Connectivity Service)
  - name: lockbox-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  # XSUAA Authentication Service
  - name: lockbox-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: lockbox-app-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          redirect-uris:
            - https://*.cfapps.*.hana.ondemand.com/**
