_schema-version: "3.2"
ID: lockbox-app
version: 1.0.0
description: SAP Lockbox Application - Upload, Review and Post to SAP
parameters:
  enable-parallel-deployments: true

modules:
  # Backend Service Module
  - name: lockbox-srv
    type: nodejs
    path: backend
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1024M
      health-check-type: http
      health-check-http-endpoint: /api/health
    properties:
      NODE_ENV: production
      SAP_URL: "https://44.196.95.84:44301"
      SAP_CLIENT: "100"
      SAP_USER: "S4H_FIN"
      SAP_PASSWORD: "Welcome1"
      DB_HOST: "postgres-aee790df-b48b-48cc-96b3-db432a62390e.czuelothxj0h.ap-southeast-2.rds.amazonaws.com"
      DB_PORT: "2477"
      DB_NAME: "CAmqjnIfEdIX"
      DB_USER: "1cf523d60c97"
      DB_PASSWORD: "593373429221a65ff07f625d1b"
      DB_SSL: "true"
    requires:
      - name: lockbox-destination
      - name: lockbox-xsuaa
      - name: lockbox-connectivity
      - name: lockbox-postgres-db
    provides:
      - name: lockbox-srv-api
        properties:
          srv-url: ${default-url}
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - "*.py"
        - "__pycache__/"

resources:
  # SAP Destination Service
  - name: lockbox-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Name: S4HANA_SYSTEM_DESTINATION
                Description: SAP S/4HANA System
                Type: HTTP
                ProxyType: OnPremise
                Authentication: BasicAuthentication
                URL: http://s4fnd:443
                User: S4H_FIN
                Password: Welcome1
                sap-client: "100"
                WebIDEEnabled: true
                WebIDEUsage: odata_abap,odata_gen,bsp_execute_abap,ui5_execute_abap,dev_abap
            existing_destinations_policy: update

  # SAP Cloud Connector (Connectivity Service)
  - name: lockbox-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  # XSUAA Authentication Service
  - name: lockbox-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: lockbox-app-${org}-${space}
        tenant-mode: dedicated
        description: Lockbox Application Security
        oauth2-configuration:
          redirect-uris:
            - https://*.cfapps.*.hana.ondemand.com/**
            - https://*.*.applicationstudio.cloud.sap/**
        role-collections:
          - name: LockboxAdmin
            description: Lockbox Administrator
            role-template-references:
              - $XSAPPNAME.Admin
          - name: LockboxUser
            description: Lockbox User
            role-template-references:
              - $XSAPPNAME.User

  # PostgreSQL Database Service (Existing Service)
  - name: lockbox-postgres-db
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: Postgresql
